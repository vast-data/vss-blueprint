# Video VSS Blueprint - Pipeline Secret
# Used by all ingest pipeline functions
#
# Usage:
#   vastde pipelines create --config deployment/data-engine-pipeline/ingest-pipeline.yaml --secret-file deployment/data-engine-pipeline/vde-video-ingest-secret-template.yaml

name: videoreasonsecret

kubernetes_cluster_vrn: <your-kubernetes-cluster-vrn>
namespace: <YOUR_NAMESPACE>

entries:
  # S3 Settings
  # Used by: video-segmenter, video-reasoner
  - key: s3accesskey
    value: ""

  - key: s3secretkey
    value: ""

  - key: s3endpoint
    value: ""

  # Provider Selection
  # Controls which pipeline flow is used:
  #   "cosmos"   → VLM flow: video-reasoner (Cosmos Reason) → video-embedder
  #   "nemotron" → VLM flow: video-reasoner (Nemotron) → video-embedder
  - key: reasoning_provider
    value: "cosmos"

  # Cosmos Reason Settings (VLM Flow)
  # Used when: reasoning_provider == "cosmos"
  # Function: video-reasoner
  - key: cosmos_host
    value: ""

  - key: cosmos_port
    value: ""

  - key: cosmos_model
    value: "./Cosmos-Reason2-8B"

  - key: cosmos_max_tokens
    value: "4000"

  - key: cosmos_temperature
    value: "0.2"

  # Nemotron Settings (VLM Flow)
  # Used when: reasoning_provider == "nemotron"
  # Function: video-reasoner
  - key: nemotron_model
    value: "nvidia/nemotron-nano-12b-v2-vl"

  - key: nemotron_endpoint
    value: "https://integrate.api.nvidia.com/v1"

  - key: nemotron_num_frames
    value: "5"

  - key: nemotron_frame_interval
    value: "0.5"

  - key: nemotron_max_tokens
    value: "4096"

  - key: nemotron_temperature
    value: "0.6"

  - key: nemotron_top_p
    value: "0.7"

  # Embedding Settings (used by: video-embedder)
  # embedding_local_nim: true  = local NIM (no API key sent)
  # embedding_local_nim: false = NVIDIA Cloud (sends nvidia_api_key)
  # Always set host/port/scheme for the endpoint you want to use
  - key: embedding_local_nim
    value: "false"

  - key: embeddinghost
    value: "integrate.api.nvidia.com"

  - key: embeddingport
    value: "443"

  - key: embeddinghttpscheme
    value: "https"

  - key: embeddingmodel
    value: "nvidia/nv-embedqa-e5-v5"

  - key: embeddingdimensions
    value: "1024"

  # nvidia_api_key: required when embedding_local_nim is false
  - key: nvidia_api_key
    value: ""

  # Video Reasoner Settings
  # Used by: video-reasoner
  - key: max_video_size_mb
    value: "100"

  - key: scenario
    value: "general"

  # VastDB Settings
  # Used by: video-vastdb-writer
  # Note: embeddingdimensions (above) is also used by video-vastdb-writer
  #       to create the vector column schema. Must match your embedding model.
  - key: vdbendpoint
    value: "http://"

  - key: vdbbucket
    value: "processed-videos-db"

  - key: vdbschema
    value: "processed-videos-schema"

  - key: vdbaccesskey
    value: ""

  - key: vdbsecretkey
    value: ""

  - key: vdbcollection
    value: "processed-videos-collection"

  # Video Segmenter Settings
  # Used by: video-segmenter
  - key: segment_duration
    value: "5"

  - key: output_codec
    value: "libx264"

  - key: output_format
    value: "mp4"

  - key: output_bucket_suffix
    value: "-segments"